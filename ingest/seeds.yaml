# IDVault — Discovery seeds.
#
# Consumed by scripts/discover_youtube.py, discover_rss.py, discover_tiktok.py.
# Keep this file in Git; keep API keys in ~/.idvault-env instead.
#
# {label} is interpolated with each subject's celebrity_label from
# known_faces/index.json. Modifiers are cheap — keep them short and specific;
# noisy modifiers blow through YouTube Data API quota fast.

# NOTE: every modifier here multiplies API cost. YouTube Data API charges
# 100 units per search.list call; free quota is 10,000/day.
# With N subjects × M modifiers you spend N*M*100 units/day.
# Default below (2 modifiers) stays under budget for up to ~50 subjects.
keyword_modifiers:
  - "{label}"
  - "{label} AI face"
  # Uncomment selectively (and watch quota):
  # - "{label} deepfake"
  # - "{label} face swap"
  # - "{label} 换脸"
  # - "{label} 广告"
  # - "{label} 代言"

# Queries that are not tied to a specific subject (generic patterns).
# Matches will land with subject_hint=null and must rely on face recognition
# to establish which subject (if any) is present.
extra_keywords:
  # - "明星 AI换脸"
  # - "celebrity deepfake ad"

youtube:
  # YouTube channel IDs to watch via RSS. Cheap, no auth.
  # Find an ID from a channel page via view-source or https://commentpicker.com/youtube-channel-id.php
  channels:
    # - { id: "UCxxxxxxxxxxxxxxxxxxxxxx", note: "example: known reposter" }

  # Data API / ytsearch tuning.
  max_results_per_query: 15
  published_within_days: 2
  # Hard ceiling on API calls per run, enforced by discover_youtube.py.
  # Free quota is 10,000 units/day; each search.list call = 100 units.
  # 80 keeps ~20% headroom for manual experimentation.
  max_queries_per_run: 80

tiktok:
  # Individual accounts you want scanned daily (handle without @).
  users:
    # - { handle: "some_handle", note: "recurring offender" }

  # Hashtag pages. High noise — pair with tight FR threshold.
  hashtags:
    # - { tag: "aiface" }
    # - { tag: "deepfake" }

  max_results_per_source: 15

# Optional per-subject overrides. Keys must match the celebrity_label exactly
# as it appears in known_faces/index.json.
subjects:
  # "Brad Pitt":
  #   extra_queries:
  #     - "Brad Pitt 保健品"
  #   skip: false
